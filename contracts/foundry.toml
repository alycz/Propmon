[profile.default]
src = "src"
out = "out"
libs = ["../node_modules"]
solc_version = "0.8.28"
evm_version = "prague"
optimizer = true
optimizer_runs = 200
fs_permissions = [
  { access = "read-write", path = "../shared" }
]

[rpc_endpoints]
monad_testnet = "${MONAD_RPC_URL}"

[etherscan]
monad_testnet = { key = "${MONADSCAN_API_KEY}", url = "https://api-testnet.monadscan.com/api" }
